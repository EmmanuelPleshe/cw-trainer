; SpeckIT PlatformIO Configuration
; CW Trainer for Arduino Uno R3

[platformio]
default_envs = desktop
src_dir = src/nano

; --- Tier 1: Native tests on host machine ---
[env:desktop]
platform = native
build_flags = -DPIO_ENV_DESKTOP -Wall -Wextra -I./lib/hal -I../test
src_dir = src/desktop
build_src_filter = +<./> +<../lib/hal/hal_desktop.cpp>
lib_deps = throwtheswitch/Unity@^2.6.0

; --- Tier 3: Arduino Uno build (for Wokwi / hardware) ---
[env:nano]
platform = atmelavr
board = uno
framework = arduino
build_flags = -Wall -Wextra -I../lib/hal
src_dir = src/nano
build_src_filter = +<./> +<../lib/hal/hal_nano.cpp>
lib_deps = LiquidCrystal@^1.0.0